<!-- Task 1:
• Write a program that changes the background color of a webpage after 5
secondsusing setTimeout(). -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Background color will change after 5 seconds</h2>

    <script>
        function changeColor()
        {
            document.body.style.backgroundColor = "lightblue";

        }

        setTimeout(changeColor,3000);
    </script>

</body>
</html>
