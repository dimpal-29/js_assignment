 <!-- Task 2:
    • Write a program to find the sum of all elements in an array of numbers. -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
         let n = Number(prompt("Enter number of elements:"));
        let numbers = [];
        let sum = 0;

   
        for (let i = 0; i < n; i++) 
        {
            numbers[i] = Number(prompt("Enter number " + (i + 1) + ":" ));
            sum = sum + numbers[i];
        }


    document.write("Array elements: " + numbers + "<br>");
    document.write("Sum of array elements is: " + sum);
    </script>

</body>
</html>
