<!-- Task 2:
    • Create a JavaScript function calculateSum that takes two numbers as parameters,
    adds them, and returns the result. -->

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

       
        let a = Number(prompt("Enter a first number"));
        let b = Number(prompt("Enter a second number"));

         function calculateSum(num1 , num2) 
         {
            
            return num1 + num2;

        }
        let result = calculateSum(a,b)

         document.write("Sum is: " + result);

    </script>

</body>
