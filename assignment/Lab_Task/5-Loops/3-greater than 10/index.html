<!-- Task 3:
    • Write a do-whileloop that continues to ask the user for input until they enter a
    number greater than 10. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        let num;

    do 
    {
        num = Number(prompt("Enter a number:"));
    } 
    while (num <= 10);

    document.write("You entered a number greater than 10: " + num);
    </script>
    
</body>
</html>
