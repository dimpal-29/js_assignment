<!-- Task 2:
    • Create a JavaScript program using a switchstatement to display the day of the
    week based on the user input (e.g., 1 for Monday, 2 for Tuesday, etc.). -->

    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>

    
        <script>

           let day = Number(prompt("Enter a number (1-7):"));

           switch(day)
           {
                case 1:
                    console.log("Monday");
                    break;

                 case 2:
                    console.log("Tuesday");
                    break;
                case 3:
                   console.log("Wednesday");
                    break;
                case 4:
                    console.timeLog("Thursday");
                    break;
                case 5:
                    console.log("Friday");
                    break;
                case 6:
                    console.log("Saturday");
                    break;
                case 7:
                    console.log("Sunday");
                    break;
                default:
                   console.log("Invalid input!!");
           }
        </script>
        
    </body>
    </html>
